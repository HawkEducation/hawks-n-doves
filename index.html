<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawks-n-Crows: Size Matters Update</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0c10; color: #66fcf1; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #1f2833; padding: 30px; border-radius: 12px; border: 1px solid #45a29e; }
        h1 { text-align: center; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #45a29e; color: #0b0c10; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #66fcf1; box-shadow: 0 0 15px #66fcf1; }
        canvas { margin-top: 20px; background: #0b0c10; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hawks-n-Crows: Size Matters 🦾</h1>
    <div class="controls">
        <button onclick="runSimulation()">Unleash the Titans</button>
    </div>
    <canvas id="strategyChart"></canvas>
    <canvas id="beakChart"></canvas>
</div>

<script>
let strategyChart, beakChart;

function runSimulation() {
    const numTrees = 150;
    const initialPopSize = 100;
    const days = 60;
    const mutationRate = 0.1;
    const wolfThreatBase = 0.1; 

    const strategies = ['Dove', 'Toucan', 'Hummingbird', 'Crow', 'Hawk'];
    const beaks = ['Nut', 'Berry', 'Finch'];

    let population = [];
    for (let i = 0; i < initialPopSize; i++) {
        population.push({
            genes: Array.from({length: 4}, () => Math.random() > 0.5 ? 'Hawk' : 'Dove'),
            beak: beaks[Math.floor(Math.random() * beaks.length)],
            size: 1.0 // Normal starting size
        });
    }

    const history = { Dove: [], Toucan: [], Hummingbird: [], Crow: [], Hawk: [], Nut: [], Berry: [], Finch: [] };

    for (let d = 0; d < days; d++) {
        let counts = { Dove: 0, Toucan: 0, Hummingbird: 0, Crow: 0, Hawk: 0, Nut: 0, Berry: 0, Finch: 0 };
        population.forEach(b => {
            const hawkCount = b.genes.filter(g => g === 'Hawk').length;
            counts[strategies[hawkCount]]++;
            counts[b.beak]++;
        });

        Object.keys(history).forEach(k => history[k].push(counts[k]));

        let trees = Array.from({length: numTrees}, () => []);
        population.forEach(b => {
            let target = Math.floor(Math.random() * numTrees); // Simplified for size testing
            trees[target].push({ ...b, currentStrat: b.genes[Math.floor(Math.random() * 4)] });
        });

        let nextPop = [];
        trees.forEach(occupants => {
            if (occupants.length === 0) return;

            // SIZE-BASED WOLF THREAT: Bigger birds are easier to spot
            occupants = occupants.filter(b => {
                let personalWolfChance = wolfThreatBase * b.size;
                return Math.random() > personalWolfChance; // Bird survives wolf
            });

            if (occupants.length === 0) return;

            if (occupants.length === 1) {
                let p = occupants[0];
                p.size += 0.1; // Grow from eating solo
                nextPop.push(p, mutate(p, mutationRate, beaks));
            } else {
                // Pick two birds to interact
                let [c1, c2] = [occupants[0], occupants[1]];
                
                // CANNIBALISM/SIZE MECHANIC: 20% size diff = automatic win/eat
                if (c1.size >= c2.size * 1.2) {
                    c1.size += 0.2;
                    nextPop.push(c1, mutate(c1, mutationRate, beaks));
                } else if (c2.size >= c1.size * 1.2) {
                    c2.size += 0.2;
                    nextPop.push(c2, mutate(c2, mutationRate, beaks));
                } else {
                    // Standard Strategy Fight if sizes are close
                    if (c1.currentStrat === 'Dove' && c2.currentStrat === 'Dove') {
                        nextPop.push(c1, c2);
                    } else if (c1.currentStrat === 'Hawk' && c2.currentStrat === 'Hawk') {
                        // Both die
                    } else {
                        const winner = c1.currentStrat === 'Hawk' ? c1 : c2;
                        winner.size += 0.1;
                        nextPop.push(winner, mutate(winner, mutationRate, beaks));
                    }
                }
            }
        });
        population = nextPop;
    }
    updateCharts(history, days);
}

function mutate(b, rate, beakList) {
    let nb = JSON.parse(JSON.stringify(b));
    if (Math.random() < rate) nb.genes[Math.floor(Math.random() * 4)] = (Math.random() > 0.5 ? 'Hawk' : 'Dove');
    if (Math.random() < rate) nb.beak = beakList[Math.floor(Math.random() * beakList.length)];
    // Size is inherited but slightly reset so they don't grow to infinity across generations
    nb.size = Math.max(0.8, b.size * 0.9); 
    return nb;
}

function updateCharts(history, days) {
    const labels = Array.from({length: days}, (_, i) => i);
    if (strategyChart) strategyChart.destroy();
    if (beakChart) beakChart.destroy();

    const config = (id, data, title) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: labels, datasets: data },
        options: { responsive: true, plugins: { title: { display: true, text: title, color: '#66fcf1' }, legend: { labels: { color: '#c5c6c7' } } } }
    });

    strategyChart = config('strategyChart', [
        { label: 'Dove', data: history.Dove, borderColor: '#3498db' },
        { label: 'Toucan', data: history.Toucan, borderColor: '#1abc9c' },
        { label: 'Hummingbird', data: history.Hummingbird, borderColor: '#9b59b6' },
        { label: 'Crow', data: history.Crow, borderColor: '#f39c12' },
        { label: 'Hawk', data: history.Hawk, borderColor: '#e74c3c' }
    ], 'Strategy Populations');

    beakChart = config('beakChart', [
        { label: 'Nut Beak', data: history.Nut, borderColor: '#795548' },
        { label: 'Berry Beak', data: history.Berry, borderColor: '#2e7d32' },
        { label: 'Finch Beak', data: history.Finch, borderColor: '#fbc02d' }
    ], 'Beak Populations');
}
runSimulation();
</script>
</body>
</html>
