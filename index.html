<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Evolution: Hawks-n-Crows</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #0f3460; background: #e94560; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #ff4d6d; }
        canvas { margin-top: 20px; background: #1b1b2f; border-radius: 8px; padding: 10px; }
        .stats-text { text-align: center; color: #95a5a6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hawks-n-Crows: The Wolf Update 🐺</h1>
    <p class="stats-text">Predators now target high-density trees. Crows, watch your backs.</p>
    
    <div class="controls">
        <button onclick="runSimulation()">Deploy The Wolves</button>
    </div>

    <canvas id="strategyChart"></canvas>
    <canvas id="beakChart"></canvas>
</div>

<script>
let strategyChart, beakChart;

function runSimulation() {
    const numTrees = 150;
    const initialPopSize = 100;
    const days = 60;
    const mutationRate = 0.1;
    const wolfThreat = 0.15; // 15% chance per bird at a tree for a wolf attack

    const treeTypes = Array(75).fill('Nut').concat(Array(75).fill('Berry'));
    const strategies = ['Dove', 'Toucan', 'Hummingbird', 'Crow', 'Hawk'];
    const beaks = ['Nut', 'Berry', 'Finch'];

    let population = [];
    for (let i = 0; i < initialPopSize; i++) {
        population.push({
            genes: Array.from({length: 4}, () => Math.random() > 0.5 ? 'Hawk' : 'Dove'),
            beak: beaks[Math.floor(Math.random() * beaks.length)]
        });
    }

    const history = { Dove: [], Toucan: [], Hummingbird: [], Crow: [], Hawk: [], Nut: [], Berry: [], Finch: [] };

    for (let d = 0; d < days; d++) {
        let counts = { Dove: 0, Toucan: 0, Hummingbird: 0, Crow: 0, Hawk: 0, Nut: 0, Berry: 0, Finch: 0 };
        population.forEach(b => {
            const hawkCount = b.genes.filter(g => g === 'Hawk').length;
            counts[strategies[hawkCount]]++;
            counts[b.beak]++;
        });

        Object.keys(history).forEach(k => history[k].push(counts[k]));

        let trees = Array.from({length: numTrees}, () => []);
        population.forEach(b => {
            let target;
            if (b.beak === 'Finch') {
                target = Math.floor(Math.random() * numTrees);
            } else {
                const home = treeTypes.map((t, i) => t === b.beak ? i : -1).filter(i => i !== -1);
                target = home[Math.floor(Math.random() * home.length)];
            }
            if (b.beak === 'Finch' || b.beak === treeTypes[target]) {
                trees[target].push({ ...b, currentStrat: b.genes[Math.floor(Math.random() * 4)] });
            }
        });

        let nextPop = [];
        trees.forEach(occupants => {
            if (occupants.length === 0) return;

            // WOLF ATTACK: Higher density = more wolf food
            if (Math.random() < (occupants.length * wolfThreat)) {
                occupants.splice(Math.floor(Math.random() * occupants.length), 1);
            }

            if (occupants.length === 0) return;

            if (occupants.length === 1) {
                let p = occupants[0];
                nextPop.push(p, mutate(p, mutationRate, beaks));
            } else {
                const [c1, c2] = [occupants[0], occupants[1]];
                if (c1.currentStrat === 'Dove' && c2.currentStrat === 'Dove') {
                    nextPop.push(c1, c2);
                } else if (c1.currentStrat === 'Hawk' && c2.currentStrat === 'Hawk') {
                    // Both die
                } else {
                    const winner = c1.currentStrat === 'Hawk' ? c1 : c2;
                    nextPop.push(winner, mutate(winner, mutationRate, beaks));
                }
            }
        });
        population = nextPop;
    }
    updateCharts(history, days);
}

function mutate(b, rate, beakList) {
    let nb = JSON.parse(JSON.stringify(b));
    if (Math.random() < rate) nb.genes[Math.floor(Math.random() * 4)] = (nb.genes[Math.floor(Math.random() * 4)] === 'Hawk' ? 'Dove' : 'Hawk');
    if (Math.random() < rate) nb.beak = beakList[Math.floor(Math.random() * beakList.length)];
    return nb;
}

function updateCharts(history, days) {
    const labels = Array.from({length: days}, (_, i) => i);
    if (strategyChart) strategyChart.destroy();
    if (beakChart) beakChart.destroy();

    const ctxS = document.getElementById('strategyChart').getContext('2d');
    strategyChart = new Chart(ctxS, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Dove', data: history.Dove, borderColor: '#3498db' },
                { label: 'Toucan', data: history.Toucan, borderColor: '#1abc9c' },
                { label: 'Hummingbird', data: history.Hummingbird, borderColor: '#9b59b6' },
                { label: 'Crow', data: history.Crow, borderColor: '#f39c12' },
                { label: 'Hawk', data: history.Hawk, borderColor: '#e74c3c' }
            ]
        },
        options: { plugins: { legend: { labels: { color: 'white' } } } }
    });

    const ctxB = document.getElementById('beakChart').getContext('2d');
    beakChart = new Chart(ctxB, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Nut Beak', data: history.Nut, borderColor: '#795548' },
                { label: 'Berry Beak', data: history.Berry, borderColor: '#2e7d32' },
                { label: 'Finch Beak', data: history.Finch, borderColor: '#fbc02d' }
            ]
        },
        options: { plugins: { legend: { labels: { color: 'white' } } } }
    });
}
runSimulation();
</script>
</body>
</html>
